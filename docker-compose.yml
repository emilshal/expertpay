services:
  postgres:
    image: postgres:16-alpine
    container_name: expertpay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: expertpay
      POSTGRES_USER: expertpay
      POSTGRES_PASSWORD: expertpay
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expertpay -d expertpay"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
